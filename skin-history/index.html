<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skin Disease Detection – History</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Skin Disease Detection History</h1>
        <p>Upload an image and detect disease. Results are saved in browser storage.</p>
    </header>

    <section class="upload-section">
        <input type="file" id="imageInput" accept="image/*" />
        <button id="detectBtn">Detect Disease</button>
    </section>

    <section id="history" class="history-container"></section>

    <footer>
        <button id="clearAllBtn" class="danger">Clear All History</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
